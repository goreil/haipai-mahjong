services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - NANIKIRU_BIN=/opt/nanikiru/nanikiru
      - DB_PATH=/app/data/games.db
    volumes:
      - app-data:/app/data
      - mortal-files:/app/mortal_analysis
      - ./app.py:/app/app.py:ro
      - ./db.py:/app/db.py:ro
      - ./mj_categorize.py:/app/mj_categorize.py:ro
      - ./mj_defense.py:/app/mj_defense.py:ro
      - ./mj_games.py:/app/mj_games.py:ro
      - ./mj_parse.py:/app/mj_parse.py:ro
      - ./static:/app/static:ro
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "2", "--timeout", "120", "--reload", "app:app"]
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  app-data:
  mortal-files:
  certbot-etc:
  certbot-var:
