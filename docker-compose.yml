services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env file}
      - NANIKIRU_URL=http://nanikiru:50000/
      - DB_PATH=/app/data/games.db
    depends_on:
      nanikiru:
        condition: service_healthy
    volumes:
      - app-data:/app/data
      - mortal-files:/app/mortal_analysis
      - ./app.py:/app/app.py:ro
      - ./routes_games.py:/app/routes_games.py:ro
      - ./routes_practice.py:/app/routes_practice.py:ro
      - ./routes_admin.py:/app/routes_admin.py:ro
      - ./db.py:/app/db.py:ro
      - ./mahjong_cpp.py:/app/mahjong_cpp.py:ro
      - ./mj_categorize.py:/app/mj_categorize.py:ro
      - ./mj_defense.py:/app/mj_defense.py:ro
      - ./mj_games.py:/app/mj_games.py:ro
      - ./mj_parse.py:/app/mj_parse.py:ro
      - ./static:/app/static:ro
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "2", "--timeout", "120", "app:app"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    expose:
      - "5000"

  nanikiru:
    build: .
    restart: unless-stopped
    command: ["/opt/nanikiru/nanikiru", "50000", "0.0.0.0"]
    working_dir: /tmp
    environment:
      - LD_LIBRARY_PATH=/opt/nanikiru/lib:/usr/lib
    expose:
      - "50000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('localhost',50000),2); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - app

  certbot:
    image: certbot/certbot:v3.1.0
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew; done'"

volumes:
  app-data:
  mortal-files:
  certbot-etc:
  certbot-var:
