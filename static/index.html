<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haipai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand" onclick="navigateHome()" style="cursor:pointer" title="Back to games">
          <div class="brand-mark"><span class="bm-m">M</span><span class="bm-p">P</span><span class="bm-s">S</span></div>
          <div>
            <h2>Haipai</h2>
            <div id="user-info" class="user-info"></div>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="showAddModal()">+ Add Game</button>
      </div>
      <div class="game-list" id="game-list"></div>
    </div>

    <div class="main">
      <div class="toolbar">
        <button class="btn sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">&#9776;</button>
        <span class="severity-filters" id="severity-filters" style="display:none">
          <label><input type="checkbox" onchange="onToggleMedium(this)"> ??</label>
          <label><input type="checkbox" onchange="onToggleMinor(this)"> ?</label>
        </span>
        <div class="spacer"></div>
        <button class="btn" id="trends-btn" onclick="showTrends()">Trends</button>
        <button class="btn" id="practice-btn" onclick="showPractice()">Practice</button>
        <div class="toolbar-menu">
          <button class="btn toolbar-menu-btn" onclick="this.parentElement.classList.toggle('open')">&#8943;</button>
          <div class="toolbar-dropdown">
            <button onclick="showHelp()">Help</button>
            <button onclick="showFeedbackModal()">Send Feedback</button>
            <button onclick="showMyFeedback()">My Feedback</button>
            <button id="admin-btn" style="display:none" onclick="showAdmin()">Admin</button>
          </div>
        </div>
      </div>
      <div class="content" id="content">
        <div class="empty-state">Select a game to review</div>
      </div>
    </div>
  </div>

  <!-- Add Game Modal -->
  <div class="modal-overlay" id="add-modal" onclick="if(event.target===this)hideAddModal()">
    <div class="modal">
      <h3>Add Game</h3>
      <div class="form-group">
        <label>Mortal analysis JSON file</label>
        <p class="form-hint">Run your replay through <a href="https://mjai.ekyu.moe" target="_blank">mjai.ekyu.moe</a>. From the results page, find <code>/report/...json</code> in the address bar, open that URL directly, and save with Ctrl+S.</p>
        <input type="file" id="add-file" accept=".json">
      </div>
      <div class="form-group">
        <label>Date (optional, defaults to today)</label>
        <input type="date" id="add-date">
      </div>
      <div class="error" id="add-error"></div>
      <div class="btn-row">
        <button class="btn" onclick="hideAddModal()">Cancel</button>
        <button class="btn btn-primary" id="add-submit-btn" onclick="submitAddGame()">Add Game</button>
      </div>
    </div>
  </div>

  <!-- Feedback Modal -->
  <div class="modal-overlay" id="feedback-modal" onclick="if(event.target===this)hideFeedbackModal()">
    <div class="modal">
      <h3>Send Feedback</h3>
      <div class="form-group">
        <label>Type</label>
        <select id="feedback-type">
          <option value="bug">Bug Report</option>
          <option value="feature">Feature Request</option>
          <option value="general" selected>General Feedback</option>
        </select>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="feedback-message" rows="5" maxlength="2000" placeholder="What's on your mind?"></textarea>
      </div>
      <div class="error" id="feedback-error"></div>
      <div class="btn-row">
        <button class="btn" onclick="hideFeedbackModal()">Cancel</button>
        <button class="btn btn-primary" id="feedback-submit-btn" onclick="submitFeedback()">Send</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
